frr version 8.4.4
frr defaults traditional
hostname core-router
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
ip route 0.0.0.0/0 192.168.0.1
!
interface eth0
 description WAN-Link-to-Home-Router
 ip address 192.168.0.235/24
exit
!
interface eth1
 description Management-Gateway-VLAN-10
 ip address 10.0.10.1/24
exit
!
interface eth1.20
 description User-VLAN-20
exit
!
